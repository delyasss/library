<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Библиотека{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            background: #faf9f7;
            color: #1a1a1a;
            min-height: 100vh;
            letter-spacing: 0.02em;
        }

        nav {
            background: #fff;
            border-bottom: 1px solid #e8e6e1;
            padding: 1.2rem 2.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        nav .links { display: flex; gap: 0.25rem; }

        nav .links a {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            color: #666;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 0.5rem 1rem;
            border-radius: 2px;
            transition: color 0.3s ease;
        }

        nav .links a:hover { color: #1a1a1a; }
        nav .links a.active { color: #1a1a1a; border-bottom: 1.5px solid #1a1a1a; }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.3rem;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-weight: 300;
            color: #999;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 2rem;
        }

        .search-box {
            width: 100%;
            padding: 0.85rem 0;
            border: none;
            border-bottom: 1px solid #d4d0ca;
            background: transparent;
            color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            margin-bottom: 2.5rem;
            outline: none;
            transition: border-color 0.3s ease;
            letter-spacing: 0.03em;
        }

        .search-box:focus { border-color: #1a1a1a; }
        .search-box::placeholder { color: #bbb; font-weight: 300; }

        .card {
            border-bottom: 1px solid #eae8e4;
            padding: 1.5rem 0;
            transition: all 0.3s ease;
            cursor: pointer;
            display: block;
            text-decoration: none;
            color: inherit;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        .card:hover { padding-left: 1rem; }
        .card:last-child { border-bottom: none; }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .card-author {
            font-weight: 300;
            color: #888;
            font-size: 0.9rem;
        }

        .card-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

        .badge {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
            border: 1px solid #d4d0ca;
            padding: 0.2rem 0.6rem;
            border-radius: 1px;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.6rem;
            font-size: 0.8rem;
            font-weight: 300;
            color: #aaa;
        }

        .stock-yes { color: #4a7c59; }
        .stock-no { color: #a05050; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #bbb;
            font-weight: 300;
            font-size: 1rem;
        }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-section {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid #eae8e4;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid #f2f0ed;
            font-size: 0.9rem;
        }

        .detail-row .label {
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: #999;
        }

        .detail-row .value { font-weight: 300; color: #333; }

        .back-link {
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #999;
            text-decoration: none;
            transition: color 0.3s;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .back-link:hover { color: #1a1a1a; }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .profile-grid .card {
            border: 1px solid #eae8e4;
            border-bottom: 1px solid #eae8e4;
            padding: 1.5rem;
        }

        .profile-grid .card:hover { padding-left: 1.5rem; border-color: #ccc; }

        .card-email {
            font-weight: 300;
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 0.15rem;
        }

        .card-detail {
            font-weight: 300;
            color: #999;
            font-size: 0.85rem;
            margin-top: 0.15rem;
        }

        .loan-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #f2f0ed;
            font-size: 0.9rem;
        }

        .loan-item:last-child { border-bottom: none; }
        .loan-item a { color: #1a1a1a; text-decoration: none; font-weight: 500; }
        .loan-item a:hover { text-decoration: underline; }

        .loan-status {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .bio-text {
            font-weight: 300;
            color: #555;
            line-height: 1.7;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <nav>
        <a class="logo" href="{% url 'books_list' %}">Biblioth&egrave;que</a>
        <div class="links">
            <a href="{% url 'books_list' %}" class="{% if request.resolver_match.url_name == 'books_list' %}active{% endif %}">Книги</a>
            <a href="{% url 'authors_list' %}" class="{% if request.resolver_match.url_name == 'authors_list' or request.resolver_match.url_name == 'author_detail' %}active{% endif %}">Авторы</a>
            <a href="{% url 'readers_list' %}" class="{% if request.resolver_match.url_name == 'readers_list' or request.resolver_match.url_name == 'reader_detail' %}active{% endif %}">Читатели</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
